<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="https://glitch.com/favicon.ico" />

    <title>Güneş Süresi Hesaplama</title>

    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="/style.css" />

    
    <!-- import the webpage's javascript file -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/script.js" defer></script>
  </head>
  <body>
    <div class="bottom-container">
      <div class="calendar-box main-box">
        Kordinatlarınızı girin:
        <input type="text" class="long-box" id="latitude" placeholder="latitude">
        <input type="text" class="long-box" id="longitude" placeholder="longitude">
        <br>
        Tarihi girin:
        <input type="date" id="full-date">
      </div>
      
      <div class="graph-box main-box">
        <canvas id="res-canvas" style="flex: 1"></canvas>
        <p id="res-box"></p>
      </div>
      
    </div>
    
  </body>
</html>
