<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Scrollable List</title>
        <link rel="stylesheet" href="style.css">
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
        </style>
    </head>
    <body>
        <template id="list-item-template">
            <li class="calendar-item" onclick="changeDate(event)">
                <div class="horizontal-container">
                    <!-- Dates -->
                    <div class="vertical-container">
                        <h3 class="no-margin day">
                            Day
                        </h3>
        
                        <p class="no-margin date">
                            Date
                        </p>
                    </div>

                    <!-- Weather -->
                    <div>

                    </div>

                    <!-- Times -->
                    <div class="vertical-container" style="align-items: flex-end;">
                        <!-- add favicon -->
                        <p class="no-margin">
                            Sunrise - Sunset
                        </p>

                        <p class="no-margin">
                            50start - 50end 
                        </p>
                    </div>
                    
                </div>       
            </li>
        </template>

        <ul id="calendar-list">
            
        </ul>

        <script>
            function addItem(day, date) {
                // Function to add a new item to the list
                const template = document.getElementById('list-item-template');
                const clone = template.content.cloneNode(true);
                const listItem = clone.querySelector('li');
                listItem.id = date;
                listItem.querySelector('.day').textContent = day;
                listItem.querySelector('.date').textContent = date;
                document.getElementById('calendar-list').appendChild(clone);
            }

            function changeDate(event) {
                let newDate = event.currentTarget.querySelector('.date').textContent;
                console.log(event.currentTarget.id)
                parent.document.getElementById('full-date').value = newDate;
                parent.updateAll()
            }

            const numOfDays = 7;
            let today = new Date();
            for(let i = 0; i < numOfDays; i++) {
                addItem(parent.numToDay(today.getDay()), parent.format(today, 'd'));
                today.setDate(today.getDate() + 1);
            }
        </script>
    </body>

    
</html>
